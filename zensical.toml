# Zensical configuration for the Soliplex Docker Compose Template docs site.
# Built with `uv run zensical build` (output under site/, gitignored) and
# published to GitHub Pages by .github/workflows/docs.yaml.
#
# Reference: https://zensical.org/docs/setup/basics/

[project]
site_name = "Soliplex Docker Compose Template"
site_description = """
Run a full Soliplex stack (backend, Flutter web frontend, haiku.rag document \
pipeline, docling-serve, Postgres) with Docker Compose.
"""
site_author = "Soliplex"
site_url = "https://soliplex.github.io/soliplex-template/"
repo_url = "https://github.com/soliplex/soliplex-template"
repo_name = "soliplex/soliplex-template"
copyright = """
Copyright &copy; Soliplex
"""

# Explicit navigation. Pages not listed here still build, but the sidebar
# order/grouping below is the source of truth.
# Reference: https://zensical.org/docs/setup/navigation/
# `docs/users/` holds the pages that document a generated stack -- the
# authoritative source the shipped docs/*.md.mako are derived from. The other
# two trees are repo-only (never derived/shipped): `docs/getting-started/`
# (how to *create* a stack) and `docs/contributing/` (developing this repo).
nav = [
    { "Home" = "index.md" },
    { "Getting started" = [
        "getting-started/generator.md",
    ] },
    { "Tutorials" = [
        "getting-started/tutorials/01-first-steps.md",
        "getting-started/tutorials/02-populate-rag.md",
        "getting-started/tutorials/03-add-a-custom-tool.md",
        "getting-started/tutorials/04-work-with-gitea.md",
    ] },
    { "Using a generated stack" = [
        "users/installation.md",
        "users/architecture/services.md",
        "users/architecture/configuration.md",
        "users/architecture/backend.md",
        "users/operations/secrets.md",
        "users/operations/rag.md",
        "users/operations/ingester.md",
        "users/custom-package.md",
    ] },
    { "Contributing" = [
        "contributing/index.md",
    ] },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions (admonitions, fenced code, content tabs, etc.). These
# mirror the Zensical default-template set; see
# https://zensical.org/docs/setup/extensions/
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
