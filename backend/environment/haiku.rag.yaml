# haiku.rag configuration file
# See https://ggozad.github.io/haiku.rag/configuration/ for details

environment: development

storage:
  data_dir: ""
  vacuum_retention_seconds: 86400

# This section is used to configure how files are added to the RAG
# database.  It is not currently working for the 'haiku-rag serve --monitor'
# usecase (see https://github.com/ggozad/haiku.rag/issues/132).
monitor:
  directories: ["docs"]
  ignore_patterns: ["*.png"]
  include_patterns: ["*.md"]

# This section is for configuring LanceDB in various "remote" modes.
# Leave it commented out to use local filesystem databases.
#lancedb:
# Configure LanceDB Cloud
# uri: ''
# api_key: ''
# region: ''

# Configure Amazon S3
# Use AWS credentials or IAM roles
# uri: s3://my-bucket/my-table

# Configure Azure Blob Storage
# Use Azure credentials
# uri: az://my-bucket/my-table

# Google Cloud Storage
# Use GCP credentials
# uri: gs://my-bucket/my-table

# Configure Hadoop file system
# uri: hdfs://namenode:port/path/to/table

embeddings:
  model:
    name: qwen3-embedding:4b
    provider: ollama
    vector_dim: 2560

# Omit the 'reranking' section to disable re-ranking.
#reranking:
# model:
#   name: ''
#   provider: ''

qa:
  model:
    name: gpt-oss:latest
    provider: ollama

research:
  model:
    name: gpt-oss:latest
    provider: ollama
  max_iterations: 2
  max_concurrency: 1


#
# Omit this section to accept the defaults.
#research:
# model:
#   name: ''
#   provider: ''

processing:
  chunk_size: 256
  converter: docling-serve  # Use remote conversion
  chunker: docling-serve    # Use remote chunking

search:
  context_radius: 0

providers:
  # The docling-serve url if you have not installed the full haiku.rag package.
  docling_serve:
    base_url: http://localhost:5001

  #
  #  Leave the 'ollama' section commented out to allow it's base URL to be
  #  populated from 'os.environ' when using the 'haiku-rag' CLI.
  #
  #  In the soliplex server, this value will be replaced by the value
  #  configured for 'OLLAMA_BASE_URL' in the installation environment (if set).
  #
  #  ollama:
  #   base_url: http://localhost:11434

  vllm:
    embeddings_base_url: ""
    rerank_base_url: ""
    qa_base_url: ""
    research_base_url: ""
