name: Build & publish soliplex-template to pypi
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC) -- no API token. The 'pypi' GitHub
    # environment must match the trusted-publisher config on PyPI (repo +
    # workflow + environment); without it the OIDC 'environment' claim is None
    # and PyPI rejects the token (422 invalid-publisher).
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Build soliplex-template
        run: uv build --sdist --wheel
      - name: Publish soliplex-template
        run: uv publish --trusted-publishing always
