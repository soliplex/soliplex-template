name: Python linting

# Mirrors soliplex/soliplex's python-lint.yaml: enforce `ruff format --check`
# and `ruff check` (same rule config, see pyproject.toml) on the repo's Python.
# The pre-commit `ruff-check`/`ruff-format` hooks gate this locally; this job is

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/**'
      - 'skill/scripts/**'
      - 'tests/**'
      - '.github/workflows/python-lint.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/**'
      - 'skill/scripts/**'
      - 'tests/**'
      - '.github/workflows/python-lint.yaml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check formatting
        run: uv run ruff format --check

      - name: Run ruff linter
        run: uv run ruff check

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_NOTIFY_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "#soliplex",
              "username": "soliplex-template",
              "text": ":x: ${{ github.workflow }} failed on ${{ github.head_ref }}:\n${{ github.event.head_commit.message }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "icon_emoji": ":ghost:"
            }
