name: Python tests/coverage

# Parallel to soliplex/soliplex's python-test.yaml. The unit step runs the
# tests/unit suite under the pyproject addopts, which include
# `--cov-fail-under=100` -- so this job is the CI enforcement of the 100% unit
# coverage gate. The functional step runs the hermetic part of tests/functional
# and skips the docker-gated cases (`-m "not needs_docker"`, the analogue of
# soliplex's `not needs_llm`); they bring up a real stack and are meant to be
# run locally / on demand. (Slack-on-failure from the soliplex version is
# omitted until SLACK_NOTIFY_URL exists -- see TODO.md, same as build-skill.yaml.)

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/**'
      - 'skill/scripts/**'
      - 'tests/**'
      - '.github/workflows/python-test.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/**'
      - 'skill/scripts/**'
      - 'tests/**'
      - '.github/workflows/python-test.yaml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      # tests/unit only (per testpaths); the pyproject addopts add
      # --cov=scripts --cov=skill/scripts --cov=tests/unit --cov-branch
      # --cov-fail-under=100, so this fails the build below 100% coverage.
      - name: Run unit tests with coverage
        run: uv run pytest

      # Hermetic functional cases only; the docker-gated ones (needs_docker)
      # bring up a real stack and are excluded from CI.
      - name: Run functional tests (no docker)
        run: uv run pytest --no-cov -m "not needs_docker" tests/functional/
