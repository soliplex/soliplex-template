name: Python tests/coverage

# Parallel to soliplex/soliplex's python-test.yaml, including its Python version
# matrix (3.12 / 3.13 / 3.14 -- the versions soliplex itself supports). The unit
# step runs the tests/unit suite under the pyproject addopts, which include
# `--cov-fail-under=100` -- so this job is the CI enforcement of the 100% unit
# coverage gate. Coverage is only enforced on Python >= 3.13 (3.12 runs the same
# suite with `--no-cov`, matching soliplex); 3.12 is a "the tooling still imports
# and runs" smoke check, not a second coverage gate. The functional step runs the
# hermetic part of tests/functional and skips the docker-gated cases
# (`-m "not needs_docker"`, the analogue of soliplex's `not needs_llm`); they
# bring up a real stack and are meant to be run locally / on demand.

on:
  push:
    branches:
      - main
    # The functional tests regenerate the embedded template (a build artifact,
    # not committed -- #135) from the repo exemplars and docs/users/, so they
    # must run when any generation source changes, not just on the skill tree.
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/**'
      - 'skills/soliplex-template/**'
      - 'src/soliplex_template/**'
      - 'tests/**'
      - 'docs/users/**'
      - 'docker-compose.yml'
      - 'backend/**'
      - 'nginx/**'
      - 'postgres/**'
      - 'haiku.rag/**'
      - 'docling-serve/**'
      - 'tui/**'
      - 'rag/**'
      - 'CLAUDE.md'
      - '.github/workflows/python-test.yaml'
  pull_request:
    branches:
      - main
    # The functional tests regenerate the embedded template (a build artifact,
    # not committed -- #135) from the repo exemplars and docs/users/, so they
    # must run when any generation source changes, not just on the skill tree.
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/**'
      - 'skills/soliplex-template/**'
      - 'src/soliplex_template/**'
      - 'tests/**'
      - 'docs/users/**'
      - 'docker-compose.yml'
      - 'backend/**'
      - 'nginx/**'
      - 'postgres/**'
      - 'haiku.rag/**'
      - 'docling-serve/**'
      - 'tui/**'
      - 'rag/**'
      - 'CLAUDE.md'
      - '.github/workflows/python-test.yaml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        # Only enforce the coverage gate on >= 3.13; 3.12 runs with --no-cov.
        include:
          - python-version: "3.12"
            cov-args: "--no-cov"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      # tests/unit only (per testpaths); the pyproject addopts add
      # --cov=scripts --cov=skill/scripts --cov=tests/unit --cov-branch
      # --cov-fail-under=100, so this fails the build below 100% coverage.
      # matrix.cov-args is "--no-cov" on 3.12 and empty (coverage enforced)
      # on 3.13 / 3.14.
      - name: Run unit tests with coverage
        run: uv run pytest ${{ matrix.cov-args }}

      # Hermetic functional cases only; the docker-gated ones (needs_docker)
      # bring up a real stack and are excluded from CI.
      - name: Run functional tests (no docker)
        run: uv run pytest --no-cov -m "not needs_docker" tests/functional/

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_NOTIFY_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "#soliplex",
              "username": "soliplex-template",
              "text": ":x: ${{ github.workflow }} failed on ${{ github.head_ref }}:\n${{ github.event.head_commit.message }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "icon_emoji": ":ghost:"
            }

  # The docker-gated functional tier (needs_docker): generate a project from the
  # embedded template, then `docker compose up -d postgres` and assert the service
  # comes up healthy and init.sh created the application databases + roles. Runs
  # only after the unit/hermetic `test` job passes. ubuntu-latest ships Docker
  # Engine + the Compose v2 plugin preinstalled, so no docker-setup action is
  # needed. A single Python version is enough -- the image build is the slow part,
  # not the interpreter -- and it runs once rather than per matrix leg.
  functest-docker:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check docker is available
        run: docker compose version

      - name: Run docker functional tests
        run: uv run pytest --no-cov -m needs_docker tests/functional/

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_NOTIFY_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "#soliplex",
              "username": "soliplex-template",
              "text": ":x: ${{ github.workflow }} (docker functest) failed on ${{ github.head_ref }}:\n${{ github.event.head_commit.message }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "icon_emoji": ":ghost:"
            }
