name: Documentation

# Builds the Zensical docs site (sources under docs/, config in zensical.toml)
# and deploys it to GitHub Pages. Requires the repository's Pages "Source" to be
# set to "GitHub Actions" (Settings -> Pages) -- a one-time manual step.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      # The 'dev' group provides zensical (pinned via uv.lock).
      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Build site
        run: uv run zensical build --clean

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - uses: actions/deploy-pages@v5
        id: deployment
