# Usage:
# docker compose up
name: soliplex-template

services:

  nginx:

    build:
      context: nginx
      dockerfile: Dockerfile

    depends_on:
      - backend
      - authelia

    # SSL cert + key are generated on the host by
    # scripts/generate-nginx-cert.sh (into .secrets/) and bind-mounted
    # here so cert rotation does not require a container rebuild.
    # nginx.conf is also bind-mounted so config edits take effect via
    # `docker compose restart nginx` (no rebuild required).
    volumes:
      - type: bind
        source: "./nginx/nginx.conf"
        target: "/etc/nginx/nginx.conf"
        read_only: true
      - type: bind
        source: "./.secrets/nginx-server.crt.gen"
        target: "/etc/nginx/ssl/server.crt"
        read_only: true
      - type: bind
        source: "./.secrets/nginx-server.key.gen"
        target: "/etc/nginx/ssl/server.key"
        read_only: true

    ports:
      - "9000:9000"
      - "9443:9443"

  authelia:

    build:
      context: authelia
      dockerfile: Dockerfile

    image: docker.io/authelia/authelia:latest

    depends_on:
      postgres:
        condition: service_healthy

    user: "1000:1000"

    secrets:
      - authelia_jwt_secret
      - authelia_session_secret
      - authelia_storage_encryption_key
      - authelia_db_password
      - authelia_oidc_hmac_secret

    # NOTE: the OIDC JWKS signing key is NOT mounted as a Docker secret.
    # Authelia does not recognise a '_FILE' env var for list entries
    # (jwks[]), so the key PEM is inlined into authelia/configuration.yml
    # by scripts/generate-secrets.sh (which also derives and injects the
    # matching public key into backend/environment/oidc/config.yaml).
    environment:
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: /run/secrets/authelia_jwt_secret
      AUTHELIA_SESSION_SECRET_FILE: /run/secrets/authelia_session_secret
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /run/secrets/authelia_storage_encryption_key
      AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE: /run/secrets/authelia_db_password
      AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE: /run/secrets/authelia_oidc_hmac_secret

    volumes:
      - type: bind
        source: "authelia"
        target: "/config"

    restart: unless-stopped

  backend:

    build:
      context: backend
      dockerfile: Dockerfile

    env_file: ".env"
    user: "1000:1000"

    depends_on:
      - postgres

    healthcheck:

      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 4

    secrets:
      - agui_db_password
      - authz_db_password
      - url_safe_token_secret
      - authelia_oidc_client_secret

    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}

    volumes:
      - type: bind
        source: "backend/environment"
        target: "/environment/"

      - type: bind
        source: "backend/sandbox/workdirs"
        target: "/sandbox/workdirs"

      - type: bind
        source: "backend/uploads"
        target: "/uploads/"

      - type: bind
        source: "rag/db/"
        target: "/db"

    ports:
      - "8000:8000"

    command: "/app/.venv/bin/soliplex-cli serve --reload=config --host=0.0.0.0 --proxy-headers --forwarded-allow-ips=* /environment"

  haiku-rag:

    image: ghcr.io/ggozad/haiku.rag-slim:latest

    build:
      context: haiku.rag
      dockerfile: Dockerfile

    ports:
      - "8001:8001"  # MCP server

    volumes:
      - ./rag/db:/data  # Persist database
      - ./rag/docs:/docs  # Mount documents directory for monitoring
      - ./haiku.rag/haiku.rag.yaml:/app/haiku.rag.yaml:ro  # Mount config file

    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      # API keys (set as needed)
      #- OPENAI_API_KEY=${OPENAI_API_KEY}
      #- ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      #- VOYAGE_API_KEY=${VOYAGE_API_KEY}
      #- CO_API_KEY=${CO_API_KEY}

    user: "1000:1000"

    depends_on:

      docling-serve:
        condition: service_healthy

    restart: unless-stopped

  docling-serve:

    #image: ghcr.io/docling-project/docling-serve:v1.16.1
    # Use CPU version for machines w/o compatible/ capable GPU
    image: ghcr.io/docling-project/docling-serve-cpu:v1.16.1

    build:
      context: docling-serve
      dockerfile: Dockerfile

    environment:
      DOCLING_SERVE_ENABLE_UI: 1

    ports:
      - "5001:5001"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s

  postgres:

    build:
      context: postgres
      dockerfile: Dockerfile

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    environment:
      AUTO_CREATE_DATABASE: ${AUTO_CREATE_DATABASE:-1}
      AGUI_DB_PASS_FILE: /run/secrets/agui_db_password
      AUTHELIA_DB_PASS_FILE: /run/secrets/authelia_db_password
      AUTHZ_DB_PASS_FILE: /run/secrets/authz_db_password
      INGESTION_DB_PASS_FILE: /run/secrets/ingestion_db_password
      POSTGRES_INITDB_ARGS: "-A scram-sha-256"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USER: postgres

    volumes:
      - type: "bind"
        source: "./postgres/config"
        target: "/docker-entrypoint-initdb.d"
        bind:
          selinux: "z"  # mark as shared

      - type: "volume"
        source: "postgres_data"
        target: "/var/lib/postgresql"

    tmpfs:
      - /var/run/postgresql:uid=999,gid=999
      - /tmp
    secrets:
      - source: agui_db_password
      - source: authelia_db_password
      - source: authz_db_password
      - source: ingestion_db_password
      - source: postgres_password
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  lancedb_data:

secrets:

#------------------------------------------------------------------------------
#  Secrets in '.secrets/*' files
#------------------------------------------------------------------------------
#
#  Generate those with '.gen' suffixes using 'scripts/generate-secrets.sh'
#------------------------------------------------------------------------------
    agui_db_password:
      file: ./.secrets/agui_db_password.gen
    authelia_db_password:
      file: ./.secrets/authelia_db_password.gen
    authelia_jwt_secret:
      file: ./.secrets/authelia_jwt_secret.gen
    authelia_oidc_client_secret:
      file: ./.secrets/authelia_oidc_client_secret.gen
    authelia_oidc_hmac_secret:
      file: ./.secrets/authelia_oidc_hmac_secret.gen
    authelia_session_secret:
      file: ./.secrets/authelia_session_secret.gen
    authelia_storage_encryption_key:
      file: ./.secrets/authelia_storage_encryption_key.gen
    authz_db_password:
      file: ./.secrets/authz_db_password.gen
    ingestion_db_password:
      file: ./.secrets/ingestion_db_password.gen
    postgres_password:
      file: ./.secrets/postgres_password.gen
    url_safe_token_secret:
      file: ./.secrets/url_safe_token_secret.gen
